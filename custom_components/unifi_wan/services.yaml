run_speedtest:
  name: Run Speedtest
  description: Trigger a speedtest on the UniFi gateway.
  fields:
    wan:
      name: WAN interface
      description: Optional WAN number to test (e.g. 1 or 2). Omit to test the active WAN.
      required: false
      example: 2
      selector:
        number:
          min: 1
          max: 4
          mode: box
